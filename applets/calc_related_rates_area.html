<!DOCTYPE html>
<html lang="en-US">

<head>
	<title>Demonstrative App</title>
	<meta charset="utf-8">  
    <!-- JSX Graph -->
	<script type="text/javascript" charset="UTF-8" src="https://cdn.jsdelivr.net/npm/jsxgraph@1.11.1/distrib/jsxgraphcore.js"></script>
	<link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/jsxgraph@1.11.1/distrib/jsxgraph.css" />
</head>


<div id="jxgbox" class="jxgbox" style="width:1000px; height:720px; float:left; resize: both"></div>

<script type='text/javascript'>

let board = JXG.JSXGraph.initBoard('jxgbox', {
    boundingbox: [-10,10,10,-10], 
    showCopyright: false, 
    showNavigation: true, 
    axis: true,
    keepaspectratio: true
});

/*  EXAMPLE - Line between two Points */

var a = board.create('point', [-8,-5]);
var b = board.create('point', [6, 4]);

var l = board.create('line', [a, b]);
var midpoint = board.create('midpoint', [a, b], { label : { visible: false }});

var circ = board.create('circle', [midpoint, b]);
var area_text = board.create('text', [0, 0, function () { return getArea(circ.Radius()) }], { anchor: midpoint, fontSize: 24 });

//var equation_text = board.create('text', [0, 0, () => line_eq()], { anchor: midpoint, fontSize: 24 });

function line_eq() {
    var slope = getSlope(a.X(), a.Y(), b.X(), b.Y());
    var yint = getIntercept(slope, a.X(), a.Y());
    return yint >= 0 ? `y = ${slope.toFixed(3)}x + ${yint.toFixed(3)}` : `y = ${slope.toFixed(3)}x - ${Math.abs(yint).toFixed(3)}`
}

function getSlope(x1, y1, x2, y2) {
    return (y2 - y1) / (x2 - x1);
}

function getIntercept(slope, x, y) {
    return -slope * x + y;
} 

function getArea(radius) {
    return Math.PI * radius ** 2; 
}

</script>

</html>
