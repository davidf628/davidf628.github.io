/*  EXAMPLE 2 - Line between two Points */

var b = board.create('point', [-8, -5]);
var a = board.create('point', [6, 4]);

var l = board.create('line', [a, b]);

var midpoint = board.create('midpoint', [a, b], { label : { visible: false }});
var slope_text = board.create('text', [0, 0, () => line_eq()], { anchor: midpoint, fontSize: 24 });

function line_eq() {
    var slope = (b.Y() - a.Y()) - (b.X() - a.X());
    var yint = -slope * a.X() + a.Y();
    return yint >= 0 ? `y = ${slope.toFixed(3)}x + ${yint.toFixed(3)}` : `y = ${slope.toFixed(3)}x - ${Math.abs(yint).toFixed(3)}`
